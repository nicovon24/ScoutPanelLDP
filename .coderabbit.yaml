# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
# Configuración de CodeRabbit para este repo (Next.js + Express + TypeScript).
# La “instalación” real es conectar la GitHub App en https://coderabbit.ai

language: "es-ES"
early_access: false

reviews:
  profile: "assertive"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  review_details: true
  auto_review:
    enabled: true
    drafts: false

chat:
  auto_reply: true
