services:
  db:
    image: postgres:16-alpine
    container_name: scout_panel_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-scout}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scout1234}
      POSTGRES_DB: ${POSTGRES_DB:-scout_panel}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scout} -d ${POSTGRES_DB:-scout_panel}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: scout_panel_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-scout}:${POSTGRES_PASSWORD:-scout1234}@db:5432/${POSTGRES_DB:-scout_panel}
      JWT_SECRET: ${JWT_SECRET:-scout_panel_super_secret_local_dev_key_change_in_prod}
      PORT: 4000
      NODE_ENV: development
      ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000/api
    container_name: scout_panel_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
